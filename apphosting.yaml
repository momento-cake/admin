# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting
#
# Environment variables are stored as secrets per backend.
# To configure for a new backend, run:
#   firebase apphosting:secrets:set <SECRET_NAME> --data-file <file>
#   firebase apphosting:secrets:grantaccess <SECRET_NAMES> --backend <backend-id>

runConfig:
  runtime: nodejs22
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2

env:
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME
  # Firebase configuration - available at BUILD and RUNTIME for NEXT_PUBLIC_* vars
  - variable: NEXT_PUBLIC_ENVIRONMENT
    secret: NEXT_PUBLIC_ENVIRONMENT
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    secret: NEXT_PUBLIC_APP_URL
    availability:
      - BUILD
      - RUNTIME

  # --- Asaas (customer self-service checkout) ---
  # Provision these secrets before deploying:
  #   firebase apphosting:secrets:set ASAAS_API_KEY        --data-file <(echo -n '<prod-key>')
  #   firebase apphosting:secrets:set ASAAS_BASE_URL       --data-file <(echo -n 'https://api.asaas.com/v3')
  #   firebase apphosting:secrets:set ASAAS_WEBHOOK_TOKEN  --data-file <(openssl rand -hex 32)
  #   firebase apphosting:secrets:set BILLING_ENCRYPTION_KEY --data-file <(openssl rand -hex 32)
  #   firebase apphosting:secrets:set PAYMENT_PROVIDER     --data-file <(echo -n 'asaas')
  #   firebase apphosting:secrets:grantaccess \
  #       ASAAS_API_KEY,ASAAS_BASE_URL,ASAAS_WEBHOOK_TOKEN,BILLING_ENCRYPTION_KEY,PAYMENT_PROVIDER \
  #       --backend <backend-id>
  - variable: ASAAS_API_KEY
    secret: ASAAS_API_KEY
    availability:
      - RUNTIME
  - variable: ASAAS_BASE_URL
    secret: ASAAS_BASE_URL
    availability:
      - RUNTIME
  - variable: ASAAS_WEBHOOK_TOKEN
    secret: ASAAS_WEBHOOK_TOKEN
    availability:
      - RUNTIME
  - variable: BILLING_ENCRYPTION_KEY
    secret: BILLING_ENCRYPTION_KEY
    availability:
      - RUNTIME
  - variable: PAYMENT_PROVIDER
    secret: PAYMENT_PROVIDER
    availability:
      - RUNTIME
